<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Juros Cielo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    padding: 28px 24px;
    width: 100%;
    max-width: 480px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: #003087;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.5px;
  }

  .header-text h1 {
    font-size: 17px;
    font-weight: 600;
    color: #111;
  }

  .header-text p {
    font-size: 12px;
    color: #888;
    margin-top: 1px;
  }

  .tabs {
    display: flex;
    background: #f0f2f5;
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: #ffffff;
    color: #003087;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  .input-group {
    margin-bottom: 20px;
  }

  .input-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #555;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap span {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: #888;
    font-weight: 500;
  }

  .input-wrap input {
    width: 100%;
    padding: 12px 14px 12px 38px;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 600;
    color: #111;
    outline: none;
    transition: border-color 0.2s;
    background: #fafafa;
  }

  .input-wrap input:focus {
    border-color: #003087;
    background: #fff;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 12px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .result-card {
    background: #f7f8fa;
    border-radius: 12px;
    padding: 12px 10px;
    text-align: center;
    border: 1.5px solid transparent;
    transition: border-color 0.15s;
  }

  .result-card:hover {
    border-color: #003087;
  }

  .result-card .rc-label {
    font-size: 11px;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 6px;
  }

  .result-card .rc-total {
    font-size: 16px;
    font-weight: 700;
    color: #111;
    margin-bottom: 3px;
  }

  .result-card .rc-parc {
    font-size: 11px;
    color: #666;
    margin-bottom: 3px;
  }

  .result-card .rc-taxa {
    font-size: 10px;
    color: #bbb;
  }

  .placeholder {
    text-align: center;
    padding: 28px 0;
    color: #bbb;
    font-size: 14px;
  }

  .placeholder svg {
    display: block;
    margin: 0 auto 10px;
    opacity: 0.3;
  }

  .footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: #ccc;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">C$</div>
    <div class="header-text">
      <h1>Calculadora Cielo</h1>
      <p>Taxas atualizadas da empresa</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="setModo('link')" id="tab-link">🔗 Link</button>
    <button class="tab" onclick="setModo('maquina')" id="tab-maquina">💳 Maquininha</button>
  </div>

  <div class="input-group">
    <label>Valor da venda</label>
    <div class="input-wrap">
      <span>R$</span>
      <input type="number" id="valor" placeholder="0,00" min="0" step="0.01" oninput="calcular()" />
    </div>
  </div>

  <div class="section-label">Valor que você recebe</div>

  <div id="resultado">
    <div class="placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      Digite o valor da venda acima
    </div>
  </div>

  <div class="footer">Valores arredondados para cima • Taxas Cielo vigentes</div>
</div>

<script>
const taxas = {
  link:    { mdr: 0.0267, cred: 0.0153, ante: [0.0306, 0.0459, 0.0768, 0.0897, 0.1026] },
  maquina: { mdr: 0.0267, cred: 0.0153, ante: [0.0306, 0.0459, 0.0826, 0.094,  0.106 ] }
};

let modo = 'link';

function setModo(m) {
  modo = m;
  document.getElementById('tab-link').classList.toggle('active', m === 'link');
  document.getElementById('tab-maquina').classList.toggle('active', m === 'maquina');
  calcular();
}

function fmt(v) {
  return 'R$ ' + Math.ceil(v).toLocaleString('pt-BR');
}

function calcular() {
  const raw = parseFloat(document.getElementById('valor').value);
  const el = document.getElementById('resultado');

  if (!raw || raw <= 0) {
    el.innerHTML = `<div class="placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
      Digite o valor da venda acima
    </div>`;
    return;
  }

  const t = taxas[modo];
  const liqBase = raw - raw * t.mdr;
  const p2 = liqBase / 2, p3 = liqBase / 3, p4 = liqBase / 4, p5 = liqBase / 5, p6 = liqBase / 6;
  const jc = liqBase * t.cred;
  const j2 = p2 * t.ante[0], j3 = p3 * t.ante[1], j4 = p4 * t.ante[2], j5 = p5 * t.ante[3], j6 = p6 * t.ante[4];
  const l3 = liqBase - jc - (p2 * t.ante[0]) - (p3 * t.ante[1]);
  const l4 = raw + (l3 - (liqBase - jc - j2 - j3 - j4));
  const l5 = raw + (l3 - (liqBase - jc - j2 - j3 - j4 - j5));
  const l6 = raw + (l3 - (liqBase - jc - j2 - j3 - j4 - j5 - j6));

  // Apenas 4x, 5x e 6x
  const parcelas = [
    { label: '4x', liq: l4, parc: l4/4, taxa: t.ante[2], n: 4 },
    { label: '5x', liq: l5, parc: l5/5, taxa: t.ante[3], n: 5 },
    { label: '6x', liq: l6, parc: l6/6, taxa: t.ante[4], n: 6 },
  ];

  let html = '<div class="results-grid">';
  for (const p of parcelas) {
    html += `
      <div class="result-card">
        <div class="rc-label">${p.label}</div>
        <div class="rc-total">${fmt(p.liq)}</div>
        <div class="rc-parc">${fmt(p.parc)}/parc.</div>
        <div class="rc-taxa">${(p.taxa * 100).toFixed(2)}% taxa</div>
      </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}
</script>
</body>
</html>
